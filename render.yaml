# Render Blueprint — API + PostgreSQL
# Deploy: https://dashboard.render.com/blueprints → New Blueprint Instance → connect GitHub repo

services:
  - type: web
    name: fishmaster-api
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps --ignore-scripts && npm run build:api
    startCommand: npm run start:api
    releaseCommand: npm run db:release -w @fishmaster/db
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fishmaster-db
          property: connectionString

databases:
  - name: fishmaster-db
    plan: free
    databaseName: fishmaster
    user: fishmaster
